<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Minha Página</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
        }

        main {
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<header>
    <h1>Bem-vindo à minha página</h1>
</header>

<main>
    <p>Esta é uma página HTML simples criada como exemplo.</p>

    <img src="https://via.placeholder.com/300" alt="Imagem de exemplo">

    <br><br>

    <button onclick="alert('Você clicou no botão!')">
        Clique aqui
    </button>
</main>

</body>
</html>
